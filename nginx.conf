# nginx config for Phonics Playground.
# - Listens on 8080 (non-privileged, matches container EXPOSE)
# - gzip compression for text (HTML); audio is already compressed (mp3/wav)
# - long-cache headers on audio (immutable — file content never changes for
#   a given filename; if Anshul re-records, the filename stays the same so
#   we use revalidation rather than busting the URL).
# - short-cache for HTML (so iterative HTML edits land quickly in the browser)

server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html SATPIN_StoryMode.html;

    # Compression for text. Audio (mp3/wav) is already compressed; don't
    # waste CPU on it.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/html text/css application/javascript application/json image/svg+xml;
    gzip_proxied any;

    # Audio: long cache (1 year). Same filename always means same content.
    location /audio/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        # Map .wav explicitly (default nginx mime types covers most others).
        types { audio/mpeg mp3; audio/wav wav; audio/aac m4a; audio/ogg ogg; }
        try_files $uri =404;
    }

    # HTML: short cache so edits propagate quickly. The artifact is a
    # single file; the cost of re-fetching 73 KB on every reload is
    # negligible vs. the value of "I just edited this file, refresh".
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=300, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        # Mic permissions: browsers require Permissions-Policy or
        # explicit allow for getUserMedia. Recording feature uses mic.
        add_header Permissions-Policy "microphone=(self), camera=()" always;
        try_files $uri =404;
    }

    # Root: redirect to the artifact. (index directive above also serves
    # SATPIN_StoryMode.html if no index.html exists.)
    location = / {
        return 302 /SATPIN_StoryMode.html;
    }

    # Disable directory listing.
    autoindex off;

    # 404s should not be informative.
    error_page 404 /404.html;
    location = /404.html {
        return 404 "Not found.";
    }
}
